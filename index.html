<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Golden Wedding Invitation | VIP Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Great+Vibes&family=Montserrat:wght@200;400&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        /* ---------------------------------------------------------
           PREMIUM ROYAL STYLESHEET (Professional daraja)
           --------------------------------------------------------- */
        :root { --gold: #c5a059; --bg: #0a0502; --cream: #e8dcc4; }
        body { background: var(--bg); color: var(--cream); font-family: 'Montserrat', sans-serif; margin: 0; overflow-x: hidden; }

        /* Darvoza (Gate) */
        #gate-container { position: fixed; inset: 0; z-index: 9999; display: flex; transition: 2s; }
        .panel { width: 50%; height: 100vh; background: #000; border: 1px solid var(--gold); }

        /* Interaktiv qism */
        .royal-seal { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 150px; height: 150px; border-radius: 50%; 
            border: 3px double var(--gold); display: flex; align-items: center; justify-content: center;
            font-family: 'Great Vibes'; font-size: 3rem; color: var(--gold);
            cursor: pointer; box-shadow: 0 0 40px rgba(197, 160, 89, 0.5);
        }

        /* Kontent */
        #content-wrapper { opacity: 0; padding: 100px 20px; text-align: center; max-width: 700px; margin: auto; }
        h1 { font-family: 'Cinzel', serif; font-size: 4rem; color: var(--gold); margin-bottom: 20px; }
        .divider { width: 100px; height: 2px; background: var(--gold); margin: 30px auto; }
        
        /* RSVP va Buttons */
        .btn-royal { padding: 20px 50px; border: 1px solid var(--gold); color: var(--gold); 
                     background: transparent; font-family: 'Cinzel', serif; cursor: pointer; }
    </style>
</head>
<body>

    <div id="gate-container">
        <div class="panel" id="left-panel"></div>
        <div class="panel" id="right-panel"></div>
        <div class="royal-seal" onclick="initVIPInvitation()">L&M</div>
    </div>

    <div id="content-wrapper">
        <h1>Layli & Majnun</h1>
        <div class="divider"></div>
        <p style="font-size: 1.5rem; font-style: italic;">"Sizni qalbimiz to'rida kutamiz"</p>
        <button class="btn-royal" onclick="window.location.href='#'">Tantana manzili</button>
    </div>

    <audio id="audio" src="music.mp3"></audio>

    <script>
        function initVIPInvitation() {
            // Animatsiya logikasi (GSAP)
            const tl = gsap.timeline();
            tl.to("#left-panel", { xPercent: -100, duration: 2, ease: "power4.inOut" })
              .to("#right-panel", { xPercent: 100, duration: 2, ease: "power4.inOut" }, "<")
              .to(".royal-seal", { opacity: 0, duration: 0.5 }, "<");

            document.getElementById('audio').play();
            gsap.to("#content-wrapper", { opacity: 1, duration: 2, delay: 1 });
            
            setTimeout(() => { document.getElementById('gate-container').style.display = 'none'; }, 2000);
        }
    </script>
</body>
</html>
