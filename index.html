<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Royal Love Story | Golden Brown</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --bg: #0A0502; }
        body { margin: 0; background: var(--bg); color: #FFF; font-family: 'Cinzel', serif; }

        /* DARVOZA VA ANIMATSIYA */
        #gate { position: fixed; inset: 0; z-index: 9999; display: flex; transition: 2s; }
        .door { width: 50%; height: 100vh; background: url('background.jpg') center/cover; border-right: 2px solid var(--gold); transition: 2s; }
        .open-l { transform: translateX(-100%); }
        .open-r { transform: translateX(100%); }

        /* MARKAZIY SEAL */
        #seal { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); cursor: pointer; text-align: center; }
        .circle { width: 120px; height: 120px; border-radius: 50%; border: 3px double var(--gold); display: flex; align-items: center; justify-content: center; font-family: 'Great Vibes'; font-size: 2rem; background: rgba(128,0,0,0.5); box-shadow: 0 0 40px var(--gold); }

        /* KONTENT */
        #content { display: none; text-align: center; padding: 100px 20px; }
        .fade-in { animation: fadeIn 3s forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="gate">
        <div class="door" id="dl"></div>
        <div class="door" id="dr" style="border-left: 2px solid var(--gold);"></div>
        <div id="seal" onclick="startShow()">
            <div class="circle">L & M</div>
            <p style="margin-top:20px; letter-spacing: 5px;">SAROYGA KIRISH</p>
        </div>
    </div>

    <div id="content" class="fade-in">
        <h1 style="color:var(--gold); font-size: 3rem;">Layli & Majnun</h1>
        <p style="font-size: 1.5rem; font-style: italic;">"Golden Brown, texture like sun..."</p>
        <div style="margin-top: 50px;">
            <p>27-Dekabr, 2026 | 18:00</p>
            <p>"IDEAL SS" Restorani</p>
        </div>
    </div>

    <audio id="audio" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <script>
        function startShow() {
            document.getElementById('dl').classList.add('open-l');
            document.getElementById('dr').classList.add('open-r');
            document.getElementById('seal').style.display = 'none';
            document.getElementById('content').style.display = 'block';
            document.getElementById('audio').play();
            setTimeout(() => { document.getElementById('gate').style.display = 'none'; }, 2000);
        }
    </script>
</body>
</html>
