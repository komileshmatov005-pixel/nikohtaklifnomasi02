<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nikoh Oqshomi | Otabek & Kumush</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@300;400&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        :root { --gold: #C5A059; --bg: #0d0d0d; }
        body { margin: 0; padding: 0; background: var(--bg); color: #fff; font-family: 'Playfair Display', serif; background-image: url('fon.jpg'); background-size: cover; background-position: center; background-attachment: fixed; }

        /* Yuqori panel */
        .header-ui { position: fixed; top: 20px; left: 20px; right: 20px; z-index: 1000; display: flex; justify-content: space-between; align-items: center; }
        .lang-btn { background: none; border: 1px solid var(--gold); color: var(--gold); padding: 5px 12px; cursor: pointer; font-family: 'Cinzel'; font-size: 10px; transition: 0.3s; }
        .lang-btn.active { background: var(--gold); color: #000; font-weight: bold; }
        
        .audio-btn { width: 40px; height: 40px; border: 1px solid var(--gold); border-radius: 50%; color: var(--gold); background: rgba(0,0,0,0.5); cursor: pointer; display: flex; align-items: center; justify-content: center; animation: rotation 8s linear infinite; }
        @keyframes rotation { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Kirish ekrani */
        #gate { position: fixed; top:0; left:0; width:100%; height:100%; background:#050505; z-index: 2000; display:flex; flex-direction:column; justify-content:center; align-items:center; transition: 1s; cursor: pointer; }
        .gate-title { font-family: 'Cinzel', serif; font-weight: 300; font-size: 2rem; letter-spacing: 8px; color: var(--gold); }
        .scroll-hint { font-size: 10px; letter-spacing: 3px; margin-top: 30px; opacity: 0.6; }

        /* Asosiy kontent */
        .container { max-width: 500px; margin: 0 auto; padding: 120px 20px; text-align: center; }
        h1 { font-family: 'Cinzel', serif; font-weight: 300; font-size: 2.8rem; color: var(--gold); margin-bottom: 30px; }
        p { line-height: 1.9; font-style: italic; font-size: 1.2rem; }
        .btn-clean { border: 1px solid var(--gold); background: none; color: var(--gold); padding: 12px 30px; cursor: pointer; font-family: 'Cinzel'; letter-spacing: 2px; transition: 0.4s; margin-top: 30px; }
        .btn-clean:hover { background: var(--gold); color: #000; }
        
        .scroll-indicator { margin-top: 50px; font-size: 10px; letter-spacing: 4px; color: var(--gold); animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="header-ui">
        <div id="lang-switcher">
            <button class="lang-btn active" id="btn-uz" onclick="setLang('uz')">LOTIN</button>
            <button class="lang-btn" id="btn-kr" onclick="setLang('kr')">КИРИЛЛ</button>
        </div>
        <button class="audio-btn" onclick="toggleMusic()">♪</button>
    </div>

    <div id="gate" onclick="openInvite()">
        <div class="gate-title">OTABEK & KUMUSH</div>
        <div class="scroll-hint" id="gate-text">O'ZBEK TILI: OCHISH UCHUN BOSING</div>
    </div>

    <div class="container">
        <h1 data-aos="fade-up" id="main-title">Otabek & Kumush</h1>
        <p data-aos="fade-up" id="main-desc">Hayotimizning eng go'zal kunida siz azizlarni nikoh oqshomimizda kutib qolamiz.</p>
        <button class="btn-clean" data-aos="fade-up" id="btn-cal">TAQVIMGA QO'SHISH</button>
        <div class="scroll-indicator" id="scroll-text">PASTGA SURING</div>
    </div>

    <audio id="royal-bg-music" loop><source src="music.mp3" type="audio/mpeg"></audio>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        const content = {
            uz: { gate: "OCHISH UCHUN BOSING", title: "Otabek & Kumush", desc: "Hayotimizning eng go'zal kunida siz azizlarni nikoh oqshomimizda kutib qolamiz.", btn: "TAQVIMGA QO'SHISH", scroll: "PASTGA SURING" },
            kr: { gate: "ОЧИШ УЧУН БОСИНГ", title: "Отабек & Кумуш", desc: "Ҳаётимизнинг энг гўзал кунида сиз азизларни никоҳ оқшомимизда кутиб қоламиз.", btn: "ТАҚВИМГА ҚЎШИШ", scroll: "ПАСТГА СУРИНГ" }
        };

        function setLang(lang) {
            document.getElementById('btn-uz').classList.toggle('active', lang === 'uz');
            document.getElementById('btn-kr').classList.toggle('active', lang === 'kr');
            document.getElementById('gate-text').innerText = content[lang].gate;
            document.getElementById('main-title').innerText = content[lang].title;
            document.getElementById('main-desc').innerText = content[lang].desc;
            document.getElementById('btn-cal').innerText = content[lang].btn;
            document.getElementById('scroll-text').innerText = content[lang].scroll;
        }

        function openInvite() {
            document.getElementById('gate').style.opacity = '0';
            setTimeout(() => document.getElementById('gate').style.display = 'none', 1000);
            AOS.init({ duration: 1500 });
            document.getElementById('royal-bg-music').play();
        }

        function toggleMusic() { 
            let m = document.getElementById('royal-bg-music');
            m.paused ? m.play() : m.pause();
        }
    </script>
</body>
</html>
