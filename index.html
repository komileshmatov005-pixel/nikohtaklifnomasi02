<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layli & Majnun To'y Taklifnomasi</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background: #1a1512; color: #e8dcc4; font-family: 'Playfair Display', serif; }
        
        /* 1-KADR: DARVOZA */
        #gate {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: url('photo.jpg') center/cover;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; transition: 1s;
        }
        .btn-enter {
            padding: 15px 30px; background: transparent; border: 1px solid #c5a059;
            color: #c5a059; cursor: pointer; font-family: 'Cinzel', serif; font-size: 1.2rem;
        }

        /* 2-KADR: KONTENT */
        #content { display: none; text-align: center; padding: 50px 20px; max-width: 500px; margin: auto; }
        .card { border: 1px solid #c5a059; padding: 30px; margin-bottom: 20px; background: rgba(26, 21, 18, 0.8); }
        h1 { color: #c5a059; font-family: 'Cinzel', serif; }
        .map-btn { display: block; background: #c5a059; color: #1a1512; padding: 10px; text-decoration: none; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <!-- Kirish qismi -->
    <div id="gate">
        <h1>Layli & Majnun</h1>
        <button class="btn-enter" onclick="openInvitation()">Taklifnomani ochish</button>
    </div>

    <!-- Asosiy qism -->
    <div id="content">
        <div class="card">
            <h2>Hurmatli mehmonlar!</h2>
            <p>Bizning eng baxtli kunimizda quvonchimizga sherik bo'lishingizni chin dildan istaymiz.</p>
        </div>

        <div class="card">
            <h3>Tantana sanasi</h3>
            <p>27-Dekabr, 2026-yil | Soat 18:00</p>
        </div>

        <div class="card">
            <h3>Manzil</h3>
            <p>"IDEAL SS" restorani</p>
            <a href="#" class="map-btn">Xaritada ko'rish</a>
        </div>
    </div>

    <audio id="bg-music" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <script>
        function openInvitation() {
            document.getElementById('gate').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('gate').style.display = 'none';
                document.getElementById('content').style.display = 'block';
                document.getElementById('bg-music').play();
            }, 1000);
        }
    </script>
</body>
</html>
