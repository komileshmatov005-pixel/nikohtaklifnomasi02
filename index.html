<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nikoh Oqshomi | Otabek & Kumush</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        :root { --royal-gold: #F3E5AB; --bright-gold: #D4AF37; }
        body, html { margin: 0; padding: 0; width: 100%; overflow-x: hidden; background: #000;
            background-image: linear-gradient(rgba(0,0,0,0.72), rgba(0,0,0,0.72)), url('fon.jpg');
            background-attachment: fixed; background-size: cover; background-position: center;
            font-family: 'Cormorant Garamond', serif; color: var(--royal-gold);
        }

        /* Til paneli */
        .lang-panel { position: fixed; top: 25px; right: 20px; z-index: 10000; display: flex; gap: 10px; }
        .lang-btn { background: rgba(20, 15, 10, 0.8); color: var(--royal-gold); border: 1px solid var(--bright-gold); padding: 6px 12px; cursor: pointer; font-family: 'Cinzel Decorative', serif; font-size: 10px; }
        .lang-btn.active { background: var(--bright-gold); color: #000; font-weight: bold; }

        /* Muhr ekrani */
        #gate-screen { position: fixed; top:0; left:0; width:100%; height:100vh; background: #000; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 1.5s ease; }
        .wax-seal-trigger { width: 110px; height: 110px; border-radius: 50%; background: radial-gradient(circle, #941C14 0%, #4A0000 100%); display: flex; justify-content: center; align-items: center; cursor: pointer; animation: royalPulse 2.5s infinite; }
        @keyframes royalPulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        /* Kontent */
        .scroll-wrapper { max-width: 540px; margin: 0 auto; padding: 80px 25px; text-align: center; }
        .monarch-names { font-family: 'Pinyon Script', cursive; font-size: 5rem; color: var(--bright-gold); }
        .btn-antique { display: block; width: 100%; padding: 14px; margin: 15px 0; background: rgba(20, 15, 10, 0.85); color: var(--bright-gold); border: 1px solid var(--bright-gold); cursor: pointer; font-family: 'Cinzel Decorative', serif; }
        .btn-antique:hover { background: var(--bright-gold); color: #000; }
        
        .vintage-countdown { display: flex; justify-content: center; gap: 20px; margin: 30px 0; }
        .v-time-unit { border-bottom: 1px solid var(--bright-gold); padding: 5px; min-width: 60px; }
    </style>
</head>
<body>

    <audio id="royal-bg-music" loop><source src="music.mp3" type="audio/mpeg"></audio>

    <div id="gate-screen">
        <div class="wax-seal-trigger" onclick="unsealInvitation()">
            <span style="font-family: 'Pinyon Script', cursive; font-size: 3rem; color: #F3E5AB;">O & K</span>
        </div>
        <p id="txt-tap" style="color:#fff; margin-top:20px;">Ochish uchun muhr ustiga bosing</p>
    </div>

    <div class="lang-panel">
        <button class="lang-btn active" id="btn-uz" onclick="changeLanguage('uz')">Lotin</button>
        <button class="lang-btn" id="btn-kr" onclick="changeLanguage('kr')">Кирилл</button>
    </div>

    <div class="scroll-wrapper">
        <h1 id="txt-title" class="monarch-names" data-aos="fade-up">Otabek & Kumush</h1>
        <p id="txt-prose" data-aos="fade-up">Hayotimizning eng go'zal kunida sizni kutamiz.</p>
        
        <div class="vintage-countdown" data-aos="fade-up">
            <div class="v-time-unit"><span id="days">00</span><small id="lbl-kun">Kun</small></div>
            <div class="v-time-unit"><span id="hours">00</span><small id="lbl-soat">Soat</small></div>
            <div class="v-time-unit"><span id="mins">00</span><small id="lbl-min">Daqiqa</small></div>
        </div>

        <button id="btn-map" class="btn-antique" onclick="window.open('https://maps.app.goo.gl/1koHhC2uAUGuJLzi7')">MANZIL</button>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        const translations = {
            uz: { tap: "Ochish uchun muhr ustiga bosing", title: "Otabek & Kumush", prose: "Hayotimizning eng go'zal kunida sizni kutamiz.", kun: "Kun", soat: "Soat", min: "Daqiqa", map: "MANZIL" },
            kr: { tap: "Очиш учун муҳр устига босинг", title: "Отабек & Кумуш", prose: "Ҳаётимизнинг энг гўзал кунида сизни кутамиз.", kun: "Кун", soat: "Соат", min: "Дақиқа", map: "МАНЗИЛ" }
        };

        function changeLanguage(lang) {
            const t = translations[lang];
            document.getElementById('txt-tap').innerText = t.tap;
            document.getElementById('txt-title').innerText = t.title;
            document.getElementById('txt-prose').innerText = t.prose;
            document.getElementById('lbl-kun').innerText = t.kun;
            document.getElementById('lbl-soat').innerText = t.soat;
            document.getElementById('lbl-min').innerText = t.min;
            document.getElementById('btn-map').innerText = t.map;
            document.getElementById('btn-uz').classList.toggle('active', lang === 'uz');
            document.getElementById('btn-kr').classList.toggle('active', lang === 'kr');
        }

        function unsealInvitation() {
            document.getElementById('gate-screen').style.opacity = '0';
            setTimeout(() => document.getElementById('gate-screen').style.display = 'none', 1500);
            document.getElementById('royal-bg-music').play();
            AOS.init({ duration: 1200, once: true });
        }
    </script>
</body>
</html>
